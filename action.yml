name: 'Tinfoil Container Release'
description: 'Updates tinfoil-config, creates release tag, and runs measurement'

inputs:
  digest:
    description: 'Container image digest from the container build'
    required: true
  version:
    description: 'Version tag (e.g., v0.0.6)'
    required: true
  github-token:
    description: 'GitHub token for authentication'
    required: true
  release-branch:
    description: 'Branch to release from (default: main)'
    required: false
    default: "main"
  mark-as-latest:
    description: 'Mark the generated GitHub release as the latest (default: false)'
    required: false
    default: "false"

runs:
  using: 'composite'
  steps:
    - name: Checkout release branch
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
      with:
        ref: ${{ inputs.release-branch }}

    - name: Update tinfoil-config.yml
      shell: bash
      run: |
        IMAGE="ghcr.io/${{ github.repository }}"
        DIGEST="${{ inputs.digest }}"
        sed -i "s|image: \"${IMAGE}[:@].*\".*|image: \"${IMAGE}@${DIGEST}\" # ${{ inputs.version }}|" tinfoil-config.yml

    - name: Create Pull Request
      id: create-pr
      uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # 7.0.11
      with:
        branch: update-config/${{ inputs.version }}
        commit-message: "chore: update container image to ${{ inputs.version }}"
        title: "chore: update container image to ${{ inputs.version }}"
        body: |
          Updates `tinfoil-config.yml` to use the container image built from tag `${{ inputs.version }}` with digest `${{ inputs.digest }}`.

    - name: Merge Pull Request
      if: steps.create-pr.outputs.pull-request-number
      shell: bash
      run: gh pr merge ${{ steps.create-pr.outputs.pull-request-number }} --rebase --admin --delete-branch
      env:
        GH_TOKEN: ${{ inputs.github-token }}

    - name: Push version tag
      if: steps.create-pr.outputs.pull-request-number
      shell: bash
      run: |
        git fetch origin ${{ inputs.release-branch }}
        git tag "${{ inputs.version }}" origin/${{ inputs.release-branch }}
        git push origin "${{ inputs.version }}"

    - name: Checkout version tag
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
      with:
        ref: ${{ inputs.version }}

    - uses: tinfoilsh/measure-image-action@43349abfd0ec3c99c088b21db36ad0066f27f70a  # v0.8.1
      with:
        config-file: ${{ github.workspace }}/tinfoil-config.yml
        github-token: ${{ inputs.github-token }}
        release-ref: ${{ inputs.version }}
        mark-as-latest: ${{ inputs.mark-as-latest }}
