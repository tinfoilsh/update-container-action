name: "Tinfoil Container Release"
description: "Updates tinfoil-config, creates release tag. Supports single or multiple container images."

inputs:
  image:
    description: "Repository name(s) of the image(s) to update (without the tag or hash). For multiple images, use newline-separated values."
    required: true
  digest:
    description: "Container image digest(s) from the container build. For multiple images, use newline-separated values (must match image order)."
    required: true
  version:
    description: "Version tag (e.g., v0.0.6)"
    required: true
  github-token:
    description: "GitHub token for authentication"
    required: true
  base-branch:
    description: "Branch to target for the PR and version tag"
    required: true

runs:
  using: "composite"
  steps:
    - name: Checkout base branch
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{ inputs.base-branch }}
        # Required so the "Push version tag" step below can git push without
        # re-authenticating.
        persist-credentials: true # zizmor: ignore[artipacked]

    - name: Plan and update config
      id: plan
      shell: bash
      env:
        IMAGES: ${{ inputs.image }}
        DIGESTS: ${{ inputs.digest }}
        VERSION: ${{ inputs.version }}
      run: python3 "${{ github.action_path }}/update_config.py"

    - name: Create Pull Request
      id: create-pr
      if: steps.plan.outputs.needs_config_update == 'true'
      uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # 7.0.11
      with:
        token: ${{ inputs.github-token }}
        base: ${{ inputs.base-branch }}
        branch: update-config/${{ inputs.version }}
        commit-message: "chore: update container image(s) to ${{ inputs.version }}"
        title: "chore: update container image(s) to ${{ inputs.version }}"
        body: |
          Updates `tinfoil-config.yml` to use the container image(s) built for `${{ inputs.version }}`.

    - name: Merge Pull Request
      if: steps.plan.outputs.needs_config_update == 'true' && steps.create-pr.outputs.pull-request-number
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        PR_NUMBER: ${{ steps.create-pr.outputs.pull-request-number }}
      run: gh pr merge "$PR_NUMBER" --rebase --admin --delete-branch

    - name: Push version tag
      if: steps.plan.outputs.needs_tag == 'true'
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
        BASE_BRANCH: ${{ inputs.base-branch }}
      run: |
        git fetch origin "$BASE_BRANCH"
        git tag "$VERSION" "origin/$BASE_BRANCH"
        git push origin "$VERSION"
