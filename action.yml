name: 'Tinfoil Container Release'
description: 'Updates tinfoil-config, creates release tag, and runs measurement'

inputs:
  digest:
    description: 'Container image digest from the container build'
    required: true
  version:
    description: 'Version tag (e.g., v0.0.6)'
    required: true
  github-token:
    description: 'GitHub token for authentication'
    required: true
  release-branch:
    description: 'Branch to release from (default: main)'
    required: false
    default: "main"
  mark-as-latest:
    description: 'Mark the generated GitHub release as the latest (default: false)'
    required: false
    default: "false"

runs:
  using: 'composite'
  steps:
    - name: Checkout release branch
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
      with:
        ref: ${{ inputs.release-branch }}

    - name: Validate inputs
      shell: bash
      run: |
        if [[ ! "${{ inputs.digest }}" =~ ^sha256:[a-f0-9]{64}$ ]]; then
          echo "::error::Invalid digest format: ${{ inputs.digest }}. Expected format: sha256:<64 hex characters>"
          exit 1
        fi

    - name: Determine which steps are needed
      id: check
      shell: bash
      run: |
        IMAGE="ghcr.io/${{ github.repository }}"
        DIGEST="${{ inputs.digest }}"
        NEEDS_CONFIG_UPDATE=true
        NEEDS_TAG=true

        # If tag exists with correct digest, everything is already done -- just re-run measurement
        if git ls-remote --tags origin "${{ inputs.version }}" | grep -q .; then
          git fetch origin "refs/tags/${{ inputs.version }}:refs/tags/${{ inputs.version }}"
          if git show "${{ inputs.version }}":tinfoil-config.yml 2>/dev/null | grep -q "image: \"${IMAGE}@${DIGEST}\""; then
            echo "::notice::Tag ${{ inputs.version }} already exists with correct digest — skipping to measurement"
            NEEDS_CONFIG_UPDATE=false
            NEEDS_TAG=false
          else
            echo "::error::Tag ${{ inputs.version }} already exists but has a different digest"
            exit 1
          fi
        # If config already has the correct digest, PR was merged but tag wasn't pushed
        elif [ -f tinfoil-config.yml ] && grep -q "image: \"${IMAGE}@${DIGEST}\"" tinfoil-config.yml; then
          echo "::notice::tinfoil-config.yml already has correct digest — skipping to tag push"
          NEEDS_CONFIG_UPDATE=false
        elif [ ! -f tinfoil-config.yml ]; then
          echo "::error::tinfoil-config.yml not found on branch ${{ inputs.release-branch }}"
          exit 1
        fi

        echo "needs_config_update=$NEEDS_CONFIG_UPDATE" >> "$GITHUB_OUTPUT"
        echo "needs_tag=$NEEDS_TAG" >> "$GITHUB_OUTPUT"

    - name: Update tinfoil-config.yml
      if: steps.check.outputs.needs_config_update == 'true'
      shell: bash
      run: |
        IMAGE="ghcr.io/${{ github.repository }}"
        DIGEST="${{ inputs.digest }}"
        sed -i "s|image: \"${IMAGE}[:@].*\".*|image: \"${IMAGE}@${DIGEST}\" # ${{ inputs.version }}|" tinfoil-config.yml
        if ! git diff --quiet tinfoil-config.yml; then
          echo "tinfoil-config.yml updated successfully"
        else
          echo "::error::sed did not modify tinfoil-config.yml — image line may not match expected pattern for ${IMAGE}"
          exit 1
        fi

    - name: Create Pull Request
      id: create-pr
      if: steps.check.outputs.needs_config_update == 'true'
      uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # 7.0.11
      with:
        branch: update-config/${{ inputs.version }}
        commit-message: "chore: update container image to ${{ inputs.version }}"
        title: "chore: update container image to ${{ inputs.version }}"
        body: |
          Updates `tinfoil-config.yml` to use the container image built from tag `${{ inputs.version }}` with digest `${{ inputs.digest }}`.

    - name: Merge Pull Request
      if: steps.check.outputs.needs_config_update == 'true' && steps.create-pr.outputs.pull-request-number
      shell: bash
      run: gh pr merge ${{ steps.create-pr.outputs.pull-request-number }} --rebase --admin --delete-branch
      env:
        GH_TOKEN: ${{ inputs.github-token }}

    - name: Push version tag
      if: steps.check.outputs.needs_tag == 'true'
      shell: bash
      run: |
        git fetch origin ${{ inputs.release-branch }}
        git tag "${{ inputs.version }}" origin/${{ inputs.release-branch }}
        git push origin "${{ inputs.version }}"

    - name: Checkout version tag
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
      with:
        ref: ${{ inputs.version }}

    - uses: tinfoilsh/measure-image-action@43349abfd0ec3c99c088b21db36ad0066f27f70a  # v0.8.1
      with:
        config-file: ${{ github.workspace }}/tinfoil-config.yml
        github-token: ${{ inputs.github-token }}
        release-ref: ${{ inputs.version }}
        mark-as-latest: ${{ inputs.mark-as-latest }}
