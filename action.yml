name: "Prepare Tinfoil Container Release"
description: "Prepares a Tinfoil Containers repository for measurement and release. Optionally updates image digests and creates a release tag."

inputs:
  version:
    description: "Version tag to create (e.g., v0.0.6)"
    required: true
  source-sha:
    description: "Commit SHA that the container image(s) were built from (pass `github.sha`)."
    required: true
  github-token:
    description: "GitHub token used to push the version tag. Use a PAT or GitHub App token if the tag push must trigger downstream workflows — the default GITHUB_TOKEN does not."
    required: true
  image-refs:
    description: "Container image references in `<repo>@sha256:<digest>` format, one per line. For multiple images, use newline-separated values. Required when update-config is true."
    required: false
  update-config:
    description: "Substitute the provided image digests into tinfoil-config.yml in the tagged commit. Leave false for repos with no tinfoil-config.yml."
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Validate inputs
      shell: bash
      env:
        SOURCE_SHA: ${{ inputs.source-sha }}
      run: |
        if [ -z "$SOURCE_SHA" ]; then
          echo "::error::source-sha is required. Pass \${{ github.sha }} from the build workflow."
          exit 1
        fi
        if [[ ! "$SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]]; then
          echo "::error::source-sha must be a full 40-character commit SHA (got: ${SOURCE_SHA})."
          exit 1
        fi

    - name: Checkout source commit
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{ inputs.source-sha }}
        token: ${{ inputs.github-token }}
        # Required so the tag push below can authenticate without a re-checkout.
        persist-credentials: true # zizmor: ignore[artipacked]

    - name: Update tinfoil-config.yml
      id: update-config
      if: inputs.update-config == 'true'
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
        SOURCE_SHA: ${{ inputs.source-sha }}
        IMAGE_REFS: ${{ inputs.image-refs }}
      run: |
        # Substitute the image digest(s) into tinfoil-config.yml. If anything
        # changed, commit it as a single child of SOURCE_SHA

        RELEASE_COMMIT="$SOURCE_SHA"

        python3 "${{ github.action_path }}/update_config.py"
        if git diff --quiet -- tinfoil-config.yml; then
          echo "::notice::tinfoil-config.yml already has the requested digest(s) -- no updates made"
        else
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Pin the commit dates to the source commit so the release commit
          # SHA is deterministic — a re-run produces an identical commit.
          SOURCE_DATE="$(git show -s --format=%cI "$SOURCE_SHA")"
          export GIT_AUTHOR_DATE="$SOURCE_DATE"
          export GIT_COMMITTER_DATE="$SOURCE_DATE"
          git add tinfoil-config.yml
          git commit -m "chore: pin container image(s) for ${VERSION}"
          RELEASE_COMMIT="$(git rev-parse HEAD)"
        fi

        echo "release-commit=${RELEASE_COMMIT}" >> "$GITHUB_OUTPUT"

    - name: Create version tag
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
        SOURCE_SHA: ${{ inputs.source-sha }}
        RELEASE_COMMIT: ${{ steps.update-config.outputs.release-commit }}
      run: |
        if git ls-remote --tags --exit-code origin "refs/tags/${VERSION}" >/dev/null 2>&1; then
          echo "::notice::Tag ${VERSION} already exists — skipping tag creation."
          exit 0
        fi

        # Tag the release commit from the update-config step, or SOURCE_SHA
        # directly when update-config was skipped.
        TAG_TARGET="${RELEASE_COMMIT:-$SOURCE_SHA}"
        git tag "$VERSION" "$TAG_TARGET"
        git push origin "$VERSION"
