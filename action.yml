name: 'Tinfoil Container Release'
description: 'Updates tinfoil-config, creates release tag'

inputs:
  image:
    description: 'Repository name of the image to update (without the tag or hash)'
    required: true
  digest:
    description: 'Container image digest from the container build'
    required: true
  version:
    description: 'Version tag (e.g., v0.0.6)'
    required: true
  github-token:
    description: 'GitHub token for authentication'
    required: true
  base-branch:
    description: 'Branch to target for the PR and version tag'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Checkout base branch
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
      with:
        ref: ${{ inputs.base-branch }}

    - name: Validate inputs
      shell: bash
      env:
        DIGEST: ${{ inputs.digest }}
      run: |
        if [[ ! "$DIGEST" =~ ^sha256:[a-f0-9]{64}$ ]]; then
          echo "::error::Invalid digest format: $DIGEST. Expected format: sha256:<64 hex characters>"
          exit 1
        fi

    - name: Determine which steps are needed for idempotence
      id: check
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
        DIGEST: ${{ inputs.digest }}
        IMAGE: ${{ inputs.image }}
      run: |
        NEEDS_CONFIG_UPDATE=true
        NEEDS_TAG=true

        # If tag exists with correct digest, nothing to do
        if git ls-remote --tags origin "refs/tags/${VERSION}" | grep -q .; then
          git fetch origin "refs/tags/${VERSION}:refs/tags/${VERSION}"
          if git show "${VERSION}:tinfoil-config.yml" 2>/dev/null | grep -q "image: \"${IMAGE}@${DIGEST}\""; then
            echo "::notice::Tag ${VERSION} already exists with correct digest — nothing to do"
            NEEDS_CONFIG_UPDATE=false
            NEEDS_TAG=false
          else
            echo "::error::Tag ${VERSION} already exists but has a different digest"
            exit 1
          fi
        # If config already has the correct digest, PR was merged but tag wasn't pushed
        elif [ -f tinfoil-config.yml ] && grep -q "image: \"${IMAGE}@${DIGEST}\"" tinfoil-config.yml; then
          echo "::notice::tinfoil-config.yml already has correct digest — skipping to tag push"
          NEEDS_CONFIG_UPDATE=false
        elif [ ! -f tinfoil-config.yml ]; then
          echo "::error::tinfoil-config.yml not found"
          exit 1
        fi

        echo "needs_config_update=$NEEDS_CONFIG_UPDATE" >> "$GITHUB_OUTPUT"
        echo "needs_tag=$NEEDS_TAG" >> "$GITHUB_OUTPUT"

    - name: Update tinfoil-config.yml
      if: steps.check.outputs.needs_config_update == 'true'
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
        DIGEST: ${{ inputs.digest }}
        IMAGE: ${{ inputs.image }}
      run: |
        sed -i "s|image: \"${IMAGE}[:@].*\".*|image: \"${IMAGE}@${DIGEST}\" # ${VERSION}|" tinfoil-config.yml
        if ! git diff --quiet tinfoil-config.yml; then
          echo "tinfoil-config.yml updated successfully"
        else
          echo "::error::sed did not modify tinfoil-config.yml — image line may not match expected pattern for ${IMAGE}"
          exit 1
        fi

    - name: Create Pull Request
      id: create-pr
      if: steps.check.outputs.needs_config_update == 'true'
      uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # 7.0.11
      with:
        base: ${{ inputs.base-branch }}
        branch: update-config/${{ inputs.version }}
        commit-message: "chore: update container image to ${{ inputs.version }}"
        title: "chore: update container image to ${{ inputs.version }}"
        body: |
          Updates `tinfoil-config.yml` to use the container image built from tag `${{ inputs.version }}` with digest `${{ inputs.digest }}`.

    - name: Merge Pull Request
      if: steps.check.outputs.needs_config_update == 'true' && steps.create-pr.outputs.pull-request-number
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        PR_NUMBER: ${{ steps.create-pr.outputs.pull-request-number }}
      run: gh pr merge "$PR_NUMBER" --rebase --admin --delete-branch

    - name: Push version tag
      if: steps.check.outputs.needs_tag == 'true'
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
        BASE_BRANCH: ${{ inputs.base-branch }}
      run: |
        git fetch origin "$BASE_BRANCH"
        git tag "$VERSION" "origin/$BASE_BRANCH"
        git push origin "$VERSION"
