name: "Tinfoil Container Release"
description: "Updates tinfoil-config, creates release tag. Supports single or multiple container images."

inputs:
  image-refs:
    description: "Container image references in `<repo>@sha256:<digest>` format, one per line. For multiple images, use newline-separated values."
    required: true
  version:
    description: "Version tag (e.g., v0.0.6)"
    required: true
  github-token:
    description: "GitHub token for authentication"
    required: true
  base-branch:
    description: "Branch to target for the PR and version tag"
    required: true

runs:
  using: "composite"
  steps:
    - name: Checkout base branch
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{ inputs.base-branch }}
        # Required so the "Push version tag" step below can git push without
        # re-authenticating.
        persist-credentials: true # zizmor: ignore[artipacked]

    - name: Plan and update config
      id: plan
      shell: bash
      env:
        IMAGE_REFS: ${{ inputs.image-refs }}
        VERSION: ${{ inputs.version }}
      run: python3 "${{ github.action_path }}/update_config.py"

    - name: Create Pull Request
      id: create-pr
      if: steps.plan.outputs.needs_config_update == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        VERSION: ${{ inputs.version }}
        BASE_BRANCH: ${{ inputs.base-branch }}
      run: |
        BRANCH="update-config/${VERSION}"
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git checkout -B "$BRANCH"
        git add tinfoil-config.yml
        git commit -m "chore: update container image(s) to ${VERSION}"
        git push --force-with-lease origin "$BRANCH"

        # Reuse an existing open PR for this branch if a previous run created
        # one but didn't merge (e.g. transient failure). Otherwise create new.
        PR_NUMBER=$(gh pr list --head "$BRANCH" --base "$BASE_BRANCH" \
          --state open --json number --jq '.[0].number // empty')
        if [ -z "$PR_NUMBER" ]; then
          PR_URL=$(gh pr create \
            --base "$BASE_BRANCH" \
            --head "$BRANCH" \
            --title "chore: update container image(s) to ${VERSION}" \
            --body "Updates \`tinfoil-config.yml\` to use the container image(s) built for \`${VERSION}\`.")
          PR_NUMBER="${PR_URL##*/}"
        fi
        echo "pull-request-number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

    - name: Merge Pull Request
      if: steps.plan.outputs.needs_config_update == 'true' && steps.create-pr.outputs.pull-request-number
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        PR_NUMBER: ${{ steps.create-pr.outputs.pull-request-number }}
      run: gh pr merge "$PR_NUMBER" --rebase --admin --delete-branch

    - name: Push version tag
      if: steps.plan.outputs.needs_tag == 'true'
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
        BASE_BRANCH: ${{ inputs.base-branch }}
      run: |
        git fetch origin "$BASE_BRANCH"
        git tag "$VERSION" "origin/$BASE_BRANCH"
        git push origin "$VERSION"
